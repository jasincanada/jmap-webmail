name: Upstream triage

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch upstream
        run: git fetch origin

      - name: Upstream status report
        run: node scripts/upstream-status.mjs --human

      - name: Fail on unmerged CVE (Option C)
        run: node scripts/upstream-status.mjs --strict