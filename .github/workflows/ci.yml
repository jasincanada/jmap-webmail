name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ship-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quick ship gate
        run: node scripts/ship-gate.mjs

      - name: Diff scope (log reviewers)
        run: node scripts/diff-scope.mjs origin/main || node scripts/diff-scope.mjs HEAD~1

  ship-gate-full:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full ship gate (includes build)
        run: node scripts/ship-gate.mjs --full